<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TP — Lecteur audio (Web Components)</title>

    <style>
      body {
        margin: 16px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .builder {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin: 14px 0;
      }
      .links {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 6px 0 14px;
      }
      .links a {
        padding: 7px 10px;
        border: 1px solid #d0d5dd;
        border-radius: 10px;
        text-decoration: none;
        color: #344054;
        background: #fff;
        font-size: 14px;
      }
      .links a:hover {
        border-color: #7c3aed;
        color: #7c3aed;
      }
      select,
      button {
        padding: 8px 10px;
      }
      .hint {
        font-size: 12px;
        opacity: 0.8;
        margin: 6px 0 14px;
      }
      audio-player {
        display: block;
        max-width: 900px;
      }
    </style>
    <script type="module">
      import "./web-components/components/audio-player/audio-player.js";
      import "./web-components/components/audio-playlist/audio-playlist.js";
      import "./web-components/components/audio-eq/audio-eq.js";
      import "./web-components/components/audio-visualizer-frequency/audio-visualizer-frequency.js";

      window.addEventListener("DOMContentLoaded", () => {
        const player = document.getElementById("player");
        const picker = document.getElementById("componentPicker");
        const addBtn = document.getElementById("addComponentBtn");
        const externalUrlInput = document.getElementById("externalUrl");
        const externalTagInput = document.getElementById("externalTag");
        const addExternalBtn = document.getElementById("addExternalBtn");
        const status = document.getElementById("externalStatus");

        const loadedModules = new Map();
        const registeredComponentKeys = new Set();
        const tagPrimarySource = new Map();
        const componentKeyToRuntimeTag = new Map();
        const declaredTagsByUrl = new Map();
        const PLAYLIST_EVENTS = ["track-select", "playlist:select", "trackchange"];

        // Son d'exemple (fichier présent à la racine)
        player.src = "Rebel_Heart.mp3";

        const demoItems = [
          { title: "Rebel Heart", url: "Rebel_Heart.mp3" },
          { title: "The Line", url: "The_Line.mp3" },
          { title: "To Ashes and Blood", url: "To_Ashes_and_Blood.mp3" },
          { title: "Ma Meilleure Ennemie", url: "Ma_Meilleure_Ennemie.mp3" },

          { title: "Pokemon", url: "Pokemon.mp3" },
          { title: "Pokemon 1", url: "Pokemon1.mp3" },
          { title: "Pokemon 2", url: "Pokemon2.mp3" },
          { title: "Pokemon 3", url: "pokemon3.mp3" },
          { title: "Pokemon 4", url: "pokemon4.mp3" },

          { title: "Fairytale (Alexander Rybak)", url: "Fairytale (Alexander Rybak).mp3" },
          { title: "End Of Beginning (Djo)", url: "End Of Beginning (Djo).mp3" },
          { title: "Die With A Smile (Lady Gaga, Bruno Mars)", url: "Die With A Smile (Lady Gaga, Bruno Mars).mp3" },
          { title: "Daylight (David Kushner)", url: "Daylight (David Kushner).mp3" },
          { title: "Human (Rag'n'Bone Man)", url: "Human (Rag'n'Bone Man).mp3" },
          { title: "Believer (Imagine Dragons)", url: "Believer (Imagine Dragons).mp3" },
          { title: "Natural (Imagine Dragons)", url: "Natural (Imagine Dragons).mp3" },
          { title: "Enemy (Imagine Dragons)", url: "Enemy (Imagine Dragons).mp3" },
          { title: "God knows... The Melancholy of Haruhi Suzumiya", url: "God knows... The Melancholy of Haruhi Suzumiya.mp3" },
        ];

        const FACTORY = {
          "audio-playlist": () => {
            const el = document.createElement("audio-playlist");
            el.setAttribute("autoplay", "");
            el.items = demoItems;
            return el;
          },
          "audio-eq": () => document.createElement("audio-eq"),
          "audio-visualizer-frequency": () => {
            const el = document.createElement("audio-visualizer-frequency");
            el.setAttribute("fft-size", "2048");
            el.setAttribute("bar-color", "#111");
            el.setAttribute("bg-color", "#fff");
            return el;
          },
        };

        addBtn.addEventListener("click", () => {
          const tag = picker.value;
          const create = FACTORY[tag];
          if (!create) return;

          // IMPORTANT: on ajoute dans <audio-player> (événements qui remontent).
          player.appendChild(create());
        });

        function setStatus(message, isError = false) {
          status.textContent = message;
          status.style.color = isError ? "#b42318" : "#175cd3";
        }

        function bridgeExternalPlaylistEvent(event) {
          const detail = event?.detail || {};
          const url = detail.url || detail.src;
          if (!url) return;

          player.dispatchEvent(
            new CustomEvent("audio:cmd:selectTrack", {
              detail: {
                url,
                title: detail.title || detail.name || "",
                autoplay: detail.autoplay ?? true,
              },
              bubbles: true,
              composed: true,
            })
          );
        }

        function setupExternalPlaylistBridge() {
          for (const eventName of PLAYLIST_EVENTS) {
            // Capture pour intercepter aussi les événements provenant des shadow DOM externes.
            player.addEventListener(eventName, bridgeExternalPlaylistEvent, true);
          }
        }

        async function ensureComponentRegistered(tag, url) {
          const normalizedTag = String(tag || "").toLowerCase();
          const normalizedUrl = new URL(url, window.location.href).toString();
          let declaredTags = declaredTagsByUrl.get(normalizedUrl);

          if (!declaredTags) {
            try {
              const response = await fetch(normalizedUrl);
              if (response.ok) {
                const sourceCode = await response.text();
                const matches = sourceCode.matchAll(/customElements\.define\(\s*['"`]([a-z0-9-]+)['"`]/gi);
                declaredTags = [...new Set(Array.from(matches, (m) => String(m[1]).toLowerCase()))];
              }
            } catch {
              declaredTags = [];
            }
            if (!declaredTags) declaredTags = [];
            declaredTagsByUrl.set(normalizedUrl, declaredTags);
          }

          const requestedTagExistsInModule = declaredTags.includes(normalizedTag);
          const effectiveTag = requestedTagExistsInModule
            ? normalizedTag
            : (declaredTags[0] || normalizedTag);
          const componentKey = `${effectiveTag}::${normalizedUrl}`;

          const buildAliasTag = (baseTag, sourceUrl) => {
            const cleanBase = baseTag.replace(/[^a-z0-9-]/g, "-") || "wc-component";
            let hash = 0;
            for (let i = 0; i < sourceUrl.length; i++) {
              hash = ((hash << 5) - hash) + sourceUrl.charCodeAt(i);
              hash |= 0;
            }
            return `${cleanBase}-src-${Math.abs(hash).toString(36)}`;
          };

          const importWithAliasedTag = async (sourceUrl, sourceTag, aliasTag) => {
            const response = await fetch(sourceUrl);
            if (!response.ok) {
              throw new Error(`Impossible de charger ${sourceUrl}`);
            }

            const sourceCode = await response.text();
            const defineRegex = new RegExp(`customElements\\.define\\(\\s*(['"])${sourceTag}\\1`, "i");
            if (!defineRegex.test(sourceCode)) {
              throw new Error(`Alias impossible: ${sourceUrl} ne declare pas explicitement <${sourceTag}>.`);
            }

            const aliasedCode = sourceCode.replace(
              defineRegex,
              `customElements.define('${aliasTag}'`
            );
            const blobUrl = URL.createObjectURL(new Blob([aliasedCode], { type: "text/javascript" }));
            try {
              await import(blobUrl);
            } finally {
              URL.revokeObjectURL(blobUrl);
            }
          };

          if (registeredComponentKeys.has(componentKey)) {
            return { runtimeTag: componentKeyToRuntimeTag.get(componentKey) || normalizedTag };
          }

          const primarySource = tagPrimarySource.get(effectiveTag);

          if (customElements.get(effectiveTag) && primarySource && primarySource !== normalizedUrl) {
            const aliasTag = buildAliasTag(effectiveTag, normalizedUrl);
            if (!customElements.get(aliasTag)) {
              await importWithAliasedTag(normalizedUrl, effectiveTag, aliasTag);
            }
            registeredComponentKeys.add(componentKey);
            componentKeyToRuntimeTag.set(componentKey, aliasTag);
            return { runtimeTag: aliasTag };
          }

          if (customElements.get(effectiveTag)) {
            if (!primarySource) {
              tagPrimarySource.set(effectiveTag, normalizedUrl);
            }
            registeredComponentKeys.add(componentKey);
            componentKeyToRuntimeTag.set(componentKey, effectiveTag);
            return { runtimeTag: effectiveTag };
          }

          if (!loadedModules.has(normalizedUrl)) {
            loadedModules.set(normalizedUrl, import(normalizedUrl));
          }

          try {
            await loadedModules.get(normalizedUrl);
            tagPrimarySource.set(effectiveTag, normalizedUrl);
            registeredComponentKeys.add(componentKey);
            componentKeyToRuntimeTag.set(componentKey, effectiveTag);
            return { runtimeTag: effectiveTag };
          } catch (error) {
            if (customElements.get(effectiveTag) && /already been used/i.test(String(error?.message || ""))) {
              if (!tagPrimarySource.get(effectiveTag)) {
                tagPrimarySource.set(effectiveTag, normalizedUrl);
              }
              registeredComponentKeys.add(componentKey);
              componentKeyToRuntimeTag.set(componentKey, effectiveTag);
              return { runtimeTag: effectiveTag };
            }

            loadedModules.delete(normalizedUrl);
            if (!customElements.get(effectiveTag)) {
              throw error;
            }

            registeredComponentKeys.add(componentKey);
            componentKeyToRuntimeTag.set(componentKey, effectiveTag);
            return { runtimeTag: effectiveTag };
          }
        }

        addExternalBtn.addEventListener("click", async () => {
          const url = externalUrlInput.value.trim();
          const tag = externalTagInput.value.trim().toLowerCase();

          if (!url || !tag) {
            setStatus("Renseigne l'URL du fichier .js et le tag du composant.", true);
            return;
          }

          if (!tag.includes("-")) {
            setStatus("Le tag doit contenir un tiret (ex: my-component).", true);
            return;
          }

          try {
            const registration = await ensureComponentRegistered(tag, url);
            const runtimeTag = registration?.runtimeTag || tag;
            const element = document.createElement(runtimeTag);
            player.appendChild(element);
            if (runtimeTag !== tag) {
              setStatus(`Tag saisi <${tag}> non trouve dans le module. Composant ajoute avec <${runtimeTag}>.`);
            } else {
              setStatus(`Composant <${runtimeTag}> ajoute avec succes.`);
            }
            externalUrlInput.value = "";
            externalTagInput.value = "";
          } catch (error) {
            setStatus(error?.message || `Impossible d'ajouter <${tag}> depuis ${url}.`, true);
          }
        });

        setupExternalPlaylistBridge();
      });
    </script>
  </head>

  <body>
    <h1>Lecteur audio</h1>
    <div class="links">
      <a href="./web-components/components/index.html">Documentation des composants</a>
    </div>

    <div class="builder">
      <select id="componentPicker">
        <option value="audio-playlist">&lt;audio-playlist&gt;</option>
        <option value="audio-eq">&lt;audio-eq&gt;</option>
        <option value="audio-visualizer-frequency">&lt;audio-visualizer-frequency&gt;</option>
      </select>
      <button id="addComponentBtn" type="button">Ajouter Web Component</button>
    </div>
    <div class="builder">
      <input id="externalUrl" type="url" placeholder="https://.../mon-component.js" style="min-width: 320px" />
      <input id="externalTag" type="text" placeholder="mon-component" />
      <button id="addExternalBtn" type="button">Ajouter composant externe</button>
    </div>
    <div id="externalStatus" class="hint"></div>

    <div class="hint">
      La page démarre “vide” (juste Play/Mute + audio). Ajoute ensuite playlist / EQ / visualiseur via le bouton.
    </div>

    <!-- Page minimale: uniquement le lecteur (Play/Mute/seek/volume sont dans <audio-player>) -->
    <audio-player id="player" volume="1"></audio-player>
  </body>
</html>
